<style>
:root{--ink:#12152a;--ink-soft:#3b4066;--muted:#8a90ad;--night:#1f2763;--night-2:#333f9c;--day:#f5a623;--day-2:#ffc35a;
--eve:#e07b00;--swing:#0a8a8a;--off:#eef1f8;--hair:#e2e6f1;--line:#dfe3f0;--accent:#e30613;--surface:#fff;
--disp:"Space Grotesk",system-ui,sans-serif;--mono:"JetBrains Mono",ui-monospace,monospace;--body:"Inter",system-ui,sans-serif;}
*{box-sizing:border-box}html,body{margin:0}
body{font-family:var(--body);color:var(--ink);background:radial-gradient(1200px 700px at 15% -10%,#fff 0%,rgba(255,255,255,0) 55%),radial-gradient(900px 600px at 110% 120%,#eaf0ff 0%,rgba(234,240,255,0) 60%),linear-gradient(160deg,#f3f5fc 0%,#e9edf8 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 24px;-webkit-font-smoothing:antialiased;}
.card{width:100%;max-width:720px;background:var(--surface);border:1px solid rgba(226,230,241,.9);border-radius:24px;padding:34px 36px 30px;box-shadow:0 1px 2px rgba(18,21,42,.04),0 2px 8px rgba(18,21,42,.04),0 30px 60px -24px rgba(31,39,99,.28);}
.eyebrow{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-weight:500;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);}
.eyebrow .tick{width:22px;height:3px;border-radius:2px;background:var(--accent);}
h1{font-family:var(--disp);font-weight:700;font-size:30px;letter-spacing:-.02em;margin:14px 0 0;line-height:1.05;}
.lede{font-size:13px;color:var(--muted);margin:9px 0 0;font-style:italic;}
.spec{display:flex;flex-wrap:wrap;gap:8px;margin:18px 0 22px;}
.chip{font-family:var(--mono);font-size:11.5px;font-weight:500;color:var(--ink-soft);border:1px solid var(--hair);border-radius:8px;padding:5px 10px;background:#fbfcff;}
.chip b{color:var(--ink);font-weight:700;}
.rhythm-wrap{margin:0 0 24px;}
.rhythm-label{display:flex;justify-content:space-between;align-items:baseline;margin:0 2px 7px;}
.rhythm-label .t{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);}
.rhythm-label .n{font-family:var(--mono);font-size:10.5px;color:var(--muted);}
.ribbon{display:flex;gap:2px;height:16px;border-radius:8px;overflow:hidden;padding:2px;background:#f4f6fc;border:1px solid var(--hair);}
.seg{flex:1;min-width:2px;border-radius:3px;}
.seg.day{background:linear-gradient(180deg,var(--day-2),var(--day));}.seg.eve{background:var(--eve);}
.seg.swing{background:var(--swing);}.seg.night{background:linear-gradient(180deg,var(--night-2),var(--night));}.seg.off{background:#e4e8f2;}
.frame{border:1px solid var(--line);border-radius:16px;overflow:hidden;}
.grid{display:grid;grid-template-columns:78px repeat(7,1fr);gap:1px;background:var(--line);}
.cell{background:#fff;height:44px;display:flex;align-items:center;justify-content:center;}
.hcell{background:linear-gradient(180deg,#1c8a57,#15794b);color:#fff;height:40px;font-family:var(--mono);font-weight:700;font-size:11px;letter-spacing:.12em;text-transform:uppercase;}
.hcell.corner{background:linear-gradient(180deg,#17804f,#116b41);color:#eafff4;font-size:10px;letter-spacing:.16em;}
.wk{background:#f7f9ff;color:var(--ink);font-family:var(--disp);font-weight:600;font-size:13px;gap:6px;}
.wk .num{font-family:var(--mono);font-weight:700;}
.shift{font-family:var(--mono);font-weight:700;font-size:12px;}
.shift.day{background:var(--day);color:#452c00;box-shadow:inset 0 1px 0 rgba(255,255,255,.5),inset 0 -6px 12px -8px rgba(120,80,0,.35);}
.shift.eve{background:var(--eve);color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.2);}
.shift.swing{background:var(--swing);color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.2);}
.shift.night{background:var(--night);color:#eaeeff;box-shadow:inset 0 1px 0 rgba(255,255,255,.14),inset 0 -8px 14px -8px rgba(0,0,0,.4);}
.shift.off{background:#f5f7fc;color:#c2c8db;}.shift.off::after{content:"\00B7";font-size:16px;line-height:0;}
.legend{display:flex;gap:18px;align-items:center;margin:18px 2px 0;flex-wrap:wrap;}
.lg{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--ink-soft);}
.lg .dot{width:13px;height:13px;border-radius:4px;}
.lg .dot.day{background:var(--day)}.lg .dot.eve{background:var(--eve)}.lg .dot.swing{background:var(--swing)}.lg .dot.night{background:var(--night)}.lg .dot.off{background:#e4e8f2}
.foot{margin:22px 2px 0;padding-top:16px;border-top:1px solid var(--hair);display:flex;justify-content:space-between;align-items:center;}
.foot .brand{font-family:var(--disp);font-weight:700;font-size:12px;color:var(--ink);}.foot .brand span{color:var(--accent);}
.foot .meta{font-family:var(--mono);font-size:10.5px;color:var(--muted);}
</style><style>.shift.gen{background:#566a8f;color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.16);}.lg .dot.gen{background:#566a8f;}.rowdiv{grid-column:1/-1;background:var(--accent);height:6px;box-shadow:0 0 0 1px var(--accent);}body{display:block;padding:36px 24px;}.pagehdr{max-width:720px;margin:0 auto 22px;}.pagehdr .k{font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);}.pagehdr h2{font-family:var(--disp);font-weight:700;font-size:24px;color:var(--ink);margin:6px 0 0;}.card{margin:0 auto 26px;}</style>
<style>
:root{--ink:#12152a;--ink-soft:#3b4066;--muted:#8a90ad;--accent:#e30613;--hair:#e2e6f1;
--disp:"Space Grotesk",system-ui,sans-serif;--mono:"JetBrains Mono",ui-monospace,monospace;--body:"Inter",system-ui,sans-serif;}
*{box-sizing:border-box}html,body{margin:0}
body{font-family:var(--body);color:var(--ink);background:radial-gradient(1200px 700px at 15% -10%,#fff 0%,rgba(255,255,255,0) 55%),radial-gradient(900px 600px at 110% 120%,#eaf0ff 0%,rgba(234,240,255,0) 60%),linear-gradient(160deg,#f3f5fc 0%,#e9edf8 100%);min-height:100vh;}
.app-hero{max-width:820px;margin:0 auto;padding:52px 24px 6px;}
.app-hero .eyebrow{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-weight:500;font-size:11.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--muted);}
.app-hero .eyebrow .tick{width:24px;height:3px;border-radius:2px;background:var(--accent);}
.app-hero h1{font-family:var(--disp);font-weight:700;font-size:44px;letter-spacing:-.03em;line-height:1.03;margin:16px 0 0;}
.app-hero h1 .r{color:var(--muted);font-weight:500;}
.app-hero p{font-size:14.5px;color:var(--ink-soft);max-width:60ch;line-height:1.55;margin:14px 0 0;}
.app-hero .prog{font-family:var(--mono);font-size:11.5px;color:var(--muted);margin:16px 0 0;}
.cat{max-width:820px;margin:22px auto 70px;padding:0 24px;}
.fam{margin-top:26px;}
.fam-h{display:flex;align-items:baseline;gap:12px;margin:0 2px 12px;}
.fam-h .nm{font-family:var(--disp);font-weight:700;font-size:21px;}
.fam-h .bl{font-size:12.5px;color:var(--muted);}
.rows{background:#fff;border:1px solid rgba(226,230,241,.9);border-radius:18px;overflow:hidden;box-shadow:0 1px 2px rgba(18,21,42,.04),0 24px 48px -30px rgba(31,39,99,.22);}
.row{display:flex;align-items:center;gap:16px;padding:16px 20px;border-top:1px solid var(--hair);cursor:pointer;transition:background .12s;}
.row:first-child{border-top:none;}
.row:hover{background:#f7f9ff;}
.row .idx{font-family:var(--mono);font-weight:700;font-size:13px;color:var(--accent);width:26px;flex:none;}
.row .main{flex:1;min-width:0;}
.row .t{font-family:var(--disp);font-weight:600;font-size:16px;}
.row .s{font-size:12.5px;color:var(--muted);margin-top:2px;}
.row .chips{display:flex;gap:6px;flex-wrap:wrap;}
.mini{font-family:var(--mono);font-size:10px;color:var(--ink-soft);border:1px solid var(--hair);border-radius:6px;padding:3px 7px;background:#fbfcff;white-space:nowrap;}
.row .rate{display:flex;align-items:center;gap:8px;flex:none;}
.row .stars{font-size:15px;letter-spacing:1px;color:#d7dcea;}
.row .stars.on{color:#f5a623;}
.row .chev{color:var(--muted);font-size:18px;flex:none;}
.ov{position:fixed;inset:0;background:rgba(18,21,42,.5);backdrop-filter:blur(3px);z-index:50;display:none;overflow-y:auto;padding:0 0 60px;}
.ov.open{display:block;}
.ovbar{position:sticky;top:0;z-index:5;background:rgba(255,255,255,.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--hair);}
.ovbar-in{max-width:780px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 20px;}
.btn{font-family:var(--body);font-weight:600;font-size:13.5px;border-radius:10px;padding:9px 15px;border:1px solid var(--hair);background:#fff;color:var(--ink);cursor:pointer;display:inline-flex;align-items:center;gap:7px;}
.btn:hover{background:#f4f6fc;}
.btn.pri{background:var(--ink);color:#fff;border-color:var(--ink);}
.btn.pri:hover{background:#20264a;}
.btn:disabled{opacity:.4;cursor:default;}
.ovbar .count{font-family:var(--mono);font-size:11.5px;color:var(--muted);text-align:center;}
.sheet{max-width:780px;margin:20px auto 0;padding:0 20px;}
.sheet .card{max-width:100%;}
.dcard{background:#fff;border:1px solid rgba(226,230,241,.9);border-radius:24px;padding:30px 32px 26px;margin-top:20px;box-shadow:0 1px 2px rgba(18,21,42,.04),0 30px 60px -30px rgba(31,39,99,.25);}
.dsec{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:9px;margin:0 0 16px;}
.dsec .tick{width:22px;height:3px;border-radius:2px;background:var(--accent);}
.dsec.mt{margin-top:28px;}
.sg3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.sg2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px;}
.stat{border:1px solid var(--hair);border-radius:13px;padding:14px 16px;background:#fbfcff;}
.stat .v{font-family:var(--disp);font-weight:700;font-size:28px;line-height:1;letter-spacing:-.02em;}
.stat .v .u{font-size:13px;font-weight:600;color:var(--muted);margin-left:3px;}
.stat .l{font-family:var(--mono);font-size:9.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-top:8px;line-height:1.35;}
.feat{margin-top:12px;border-left:3px solid var(--accent);background:#fbfcff;border-radius:0 12px 12px 0;padding:14px 18px;font-size:14px;line-height:1.6;color:var(--ink-soft);}
.part{display:flex;gap:14px;padding:15px 0;border-top:1px solid var(--hair);}
.part:first-child{border-top:none;}
.pnum{flex:none;width:26px;height:26px;border-radius:8px;background:var(--ink);color:#fff;font-family:var(--mono);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;}
.pt{font-family:var(--disp);font-weight:600;font-size:15px;margin:2px 0 6px;}
.part p{margin:0;font-size:13.5px;line-height:1.6;color:var(--ink-soft);}
.ratebox{margin-top:20px;background:#fff;border:1px solid rgba(226,230,241,.9);border-radius:20px;padding:22px 26px;display:flex;align-items:center;justify-content:space-between;gap:16px;box-shadow:0 20px 40px -30px rgba(31,39,99,.25);}
.ratebox .q{font-family:var(--disp);font-weight:600;font-size:16px;}
.ratebox .sub{font-size:12.5px;color:var(--muted);margin-top:3px;}
.starpick{display:flex;gap:6px;}
.starpick span{font-size:30px;color:#d7dcea;cursor:pointer;transition:transform .08s;}
.starpick span:hover{transform:scale(1.12);}
.starpick span.on{color:#f5a623;}
.saved{font-family:var(--mono);font-size:11px;color:#1c8a57;margin-top:6px;height:14px;}
.foot{max-width:820px;margin:0 auto;padding:0 24px 50px;}
.foot .line{border-top:1px solid var(--hair);padding-top:16px;display:flex;justify-content:space-between;color:var(--muted);}
.foot .b{font-family:var(--disp);font-weight:700;font-size:12px;color:var(--ink);}.foot .b span{color:var(--accent);}
.foot .m{font-family:var(--mono);font-size:10px;}
@media(max-width:640px){.app-hero h1{font-size:34px;}.row .chips{display:none;}.ratebox{flex-direction:column;align-items:flex-start;}}
</style></head>

const FLAT=[];FAMS.forEach(f=>f.scheds.forEach(s=>FLAT.push({...s,fam:f.name})));
const ratings={};
function starStr(n){let s="";for(let i=1;i<=5;i++)s+= i<=n?"★":"☆";return s;}
function ratedCount(){return Object.keys(ratings).length;}
function updateProg(){document.getElementById("prog").textContent=`${FAMS.length} families · ${FLAT.length} schedules · ${ratedCount()} rated`;
  document.getElementById("footm").textContent=`Schedule Catalog · ${FLAT.length} schedules`;}
function renderCat(){
  let h="";
  FAMS.forEach((f)=>{
    h+=`<div class="fam"><div class="fam-h"><span class="nm">${f.name}</span><span class="bl">${f.blurb}</span></div><div class="rows">`;
    f.scheds.forEach((s)=>{
      const fi=FLAT.findIndex(x=>x.id===s.id);const r=ratings[s.id]||0;
      h+=`<div class="row" onclick="openSched('${s.id}')">
        <span class="idx">${String(fi+1).padStart(2,'0')}</span>
        <div class="main"><div class="t">${s.title}</div><div class="s">${s.sub}</div></div>
        <div class="chips">${s.chips.map(c=>`<span class="mini">${c}</span>`).join("")}</div>
        <div class="rate"><span class="stars ${r?'on':''}" id="rowstars-${s.id}">${r?starStr(r):"☆☆☆☆☆"}</span></div>
        <span class="chev">›</span></div>`;
    });
    h+=`</div></div>`;
  });
  document.getElementById("cat").innerHTML=h;updateProg();
}
let curIdx=0;
function statTile(v,u,l){return `<div class="stat"><div class="v">${v}${u?`<span class="u">${u}</span>`:""}</div><div class="l">${l}</div></div>`;}
function renderSheet(i){
  const s=FLAT[i];const st=s.stats;const r=ratings[s.id]||0;
  document.getElementById("ovcount").textContent=`Schedule ${i+1} of ${FLAT.length} · ${s.fam}`;
  document.getElementById("nextbtn").disabled=(i>=FLAT.length-1);
  document.getElementById("sheet").innerHTML=`
   <div class="card-holder">${s.card}</div>
   <div class="dcard">
     <div class="dsec"><span class="tick"></span>Key Statistics</div>
     <div class="sg3">${statTile(st.work,"days","Scheduled work days / year")}${statTile(st.off,"days","Scheduled days off / year")}${statTile(st.hrs,"hrs","Average hours worked / week")}</div>
     <div class="sg2">${statTile(st.full,"","Full weekends off / year")}${statTile(st.half,"","Half weekends off / year")}${statTile(st.most,"days","Most days of work in a row")}${statTile(st.fewest,"days","Fewest days of work in a row")}</div>

  document.getElementById("ov").scrollTop=0;
}
function openSched(id){curIdx=FLAT.findIndex(x=>x.id===id);renderSheet(curIdx);document.getElementById("ov").classList.add("open");document.body.style.overflow="hidden";}
function closeOv(){document.getElementById("ov").classList.remove("open");document.body.style.overflow="";renderCat();}

function rate(id,n){ratings[id]=n;document.querySelectorAll("#starpick span").forEach(x=>x.classList.toggle("on",parseInt(x.dataset.n)<=n));document.getElementById("saved").textContent="Saved — you rated this "+n+"/5";}
